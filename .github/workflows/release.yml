name: Build & Release

# Build for Windows, macOS and Linux and publish the artifacts to a GitHub
# Release. Runs only when main is updated.
on:
  push:
    branches: [main]

# Needed so the release job can create/update releases.
permissions:
  contents: write

jobs:
  # Read the app version from pubspec.yaml once and share it with the other jobs.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: get
        run: |
          version=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected version: $version"

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Linux desktop build dependencies.
      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config liblzma-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Build ${{ matrix.platform }}
        run: flutter build ${{ matrix.platform }} --release

      # --- Package each platform into a standalone installer/executable ---

      # Windows: build an installer .exe with Inno Setup.
      - name: Build Windows installer
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          New-Item -ItemType Directory -Force dist | Out-Null
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyVersion=${{ needs.version.outputs.version }}" "/DMyRoot=$(Get-Location)" windows\sgfscrcpy.iss

      # macOS: build a .dmg with a drag-to-Applications shortcut.
      - name: Build macOS DMG
        if: matrix.platform == 'macos'
        run: |
          brew install create-dmg
          mkdir -p dist dmgsrc
          app=$(ls -d build/macos/Build/Products/Release/*.app | head -1)
          cp -R "$app" dmgsrc/
          create-dmg \
            --volname "SgfScrcpy" \
            --window-size 600 320 \
            --icon-size 120 \
            --icon "$(basename "$app")" 160 160 \
            --app-drop-link 440 160 \
            "dist/sgfscrcpy-macos-v${{ needs.version.outputs.version }}.dmg" \
            "dmgsrc" || true
          # create-dmg can exit non-zero even on success; verify the file exists.
          ls -la dist/*.dmg

      # Linux: build a single-file AppImage.
      - name: Build Linux AppImage
        if: matrix.platform == 'linux'
        env:
          ARCH: x86_64
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          sudo apt-get install -y imagemagick
          mkdir -p dist AppDir/usr/bin
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
          # Minimal launcher, desktop entry and icon required by AppImage.
          cat > AppDir/AppRun <<'SH'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/sgf_scrcpy" "$@"
          SH
          chmod +x AppDir/AppRun
          cat > AppDir/sgfscrcpy.desktop <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=SgfScrcpy
          Exec=sgf_scrcpy
          Icon=sgfscrcpy
          Categories=Utility;
          DESKTOP
          convert -size 256x256 xc:'#6C5CE7' AppDir/sgfscrcpy.png
          cp AppDir/sgfscrcpy.png AppDir/.DirIcon
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage AppDir "dist/sgfscrcpy-linux-v${{ needs.version.outputs.version }}.AppImage"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sgfscrcpy-${{ matrix.platform }}
          path: dist/*

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: SgfScrcpy v${{ needs.version.outputs.version }}
          body: |
            Automated build of SgfScrcpy v${{ needs.version.outputs.version }}.

            **Downloads**
            - Windows: `sgfscrcpy-windows-setup-*.exe` (installer)
            - macOS: `sgfscrcpy-macos-*.dmg` (drag to Applications)
            - Linux: `sgfscrcpy-linux-*.AppImage` (`chmod +x` then run)
          files: artifacts/**/*
          make_latest: true
          fail_on_unmatched_files: true
